<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeCosimo Law</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sage: #2a4036;
        --sage-dark: #1a2a23;
        --champagne: #c9a96c;
        --cream: #fbf8f4;
        --dark: #1c1f1e;
        --muted: #6b7068;
        --light-border: rgba(42, 64, 54, 0.12);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        font-family: "DM Sans", sans-serif;
        background-color: var(--cream);
        color: var(--dark);
        overflow: hidden;
      }

      /* ── Top Bar ── */
      .topbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 100;
        padding: 0 36px;
        height: 68px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(251, 248, 244, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--light-border);
      }

      .wordmark {
        display: flex;
        align-items: baseline;
        gap: 10px;
        text-decoration: none;
        user-select: none;
      }

      .wordmark-primary {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: 1.45rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--sage);
        white-space: nowrap;
      }

      .wordmark-divider {
        width: 1px;
        height: 18px;
        background: rgba(42, 64, 54, 0.25);
        flex-shrink: 0;
      }

      .wordmark-sub {
        font-family: "DM Sans", sans-serif;
        font-size: 0.65rem;
        font-weight: 500;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--champagne);
        white-space: nowrap;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .step-counter {
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .step-counter span { color: var(--sage); font-weight: 600; }

      .btn-home {
        font-family: "DM Sans", sans-serif;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--light-border);
        border-radius: 40px;
        padding: 7px 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 7px;
        transition: color 0.2s, border-color 0.2s;
      }

      .btn-home:hover { color: var(--sage); border-color: rgba(42,64,54,0.3); }

      /* ── Progress bar ── */
      .progress-bar {
        position: fixed;
        top: 68px; left: 0; right: 0;
        height: 2px;
        background: var(--light-border);
        z-index: 99;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .progress-bar.visible { opacity: 1; }

      .progress-fill {
        height: 100%;
        background: var(--champagne);
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ── Views ── */
      .view {
        position: fixed;
        top: 70px; left: 0; right: 0; bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      .view.active {
        opacity: 1;
        pointer-events: all;
      }

      /* ── Landing view ── */
      #view-landing {
        flex-direction: column;
        gap: 0;
        padding: 40px 24px;
      }

      .landing-inner {
        width: 100%;
        max-width: 480px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .landing-greeting {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(1.6rem, 3vw, 2.2rem);
        font-weight: 300;
        color: var(--sage);
        margin-bottom: 8px;
        line-height: 1.25;
      }

      .landing-sub {
        font-size: 0.85rem;
        color: var(--muted);
        margin-bottom: 36px;
        line-height: 1.6;
      }

      .btn-landing {
        width: 100%;
        padding: 22px 32px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        font-family: "DM Sans", sans-serif;
        font-size: 1rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        text-align: left;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        transition: transform 0.18s, box-shadow 0.18s;
      }

      .btn-landing:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(42, 64, 54, 0.14);
      }

      .btn-landing:active { transform: translateY(0); }

      .btn-landing.primary {
        background: var(--sage);
        color: #fff;
        box-shadow: 0 2px 16px rgba(42, 64, 54, 0.18);
      }

      .btn-landing.secondary {
        background: #fff;
        color: var(--sage);
        border: 1px solid var(--light-border);
        box-shadow: 0 2px 12px rgba(42, 64, 54, 0.07);
      }

      .btn-landing-label {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .btn-landing-title {
        font-size: 1.05rem;
        font-weight: 600;
      }

      .btn-landing-desc {
        font-size: 0.75rem;
        opacity: 0.65;
        font-weight: 400;
      }

      .btn-landing-arrow {
        flex-shrink: 0;
        opacity: 0.5;
      }

      /* ── Homework (steps) view ── */
      #view-homework {
        flex-direction: column;
        padding: 0;
      }

      .steps-viewport {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .step {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 24px 100px;
        opacity: 0;
        pointer-events: none;
        transform: translateX(60px);
        transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .step.active {
        opacity: 1;
        pointer-events: all;
        transform: translateX(0);
      }

      .step.exit-left {
        opacity: 0;
        transform: translateX(-60px);
      }

      .step-inner {
        width: 100%;
        max-width: 560px;
      }

      .step-label {
        font-size: 0.68rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--champagne);
        margin-bottom: 14px;
      }

      .step-question {
        font-family: "Cormorant Garamond", Georgia, serif;
        font-size: clamp(2rem, 4.5vw, 3rem);
        font-weight: 300;
        color: var(--sage);
        line-height: 1.2;
        margin-bottom: 40px;
      }

      .step-input {
        width: 100%;
        background: transparent;
        border: none;
        border-bottom: 2px solid rgba(42, 64, 54, 0.25);
        padding: 12px 0;
        font-family: "DM Sans", sans-serif;
        font-size: 1.3rem;
        font-weight: 300;
        color: var(--dark);
        outline: none;
        transition: border-color 0.2s;
        caret-color: var(--champagne);
      }

      .step-input::placeholder { color: rgba(42, 64, 54, 0.25); }
      .step-input:focus { border-bottom-color: var(--sage); }

      /* ── Bottom nav ── */
      .nav-bar {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 80px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 36px;
        background: rgba(251, 248, 244, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top: 1px solid var(--light-border);
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }

      .nav-bar.visible {
        opacity: 1;
        pointer-events: all;
      }

      .btn-back {
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--muted);
        background: transparent;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 0;
        transition: color 0.2s, opacity 0.2s;
      }

      .btn-back:hover { color: var(--sage); }
      .btn-back:disabled { opacity: 0; pointer-events: none; }

      .btn-next {
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #fff;
        background: var(--sage);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 32px;
        border-radius: 40px;
        transition: background 0.2s, transform 0.15s;
      }

      .btn-next:hover { background: var(--sage-dark); transform: translateY(-1px); }
      .btn-next:active { transform: translateY(0); }
    </style>
  </head>
  <body>

    <!-- Top bar -->
    <header class="topbar">
      <a class="wordmark" href="#">
        <span class="wordmark-primary">DeCosimo Law</span>
        <span class="wordmark-divider"></span>
        <span class="wordmark-sub">Estate Planning</span>
      </a>
      <div class="topbar-right">
        <span class="step-counter" id="step-counter" style="display:none">
          Step <span id="step-num">1</span> of <span id="step-total">2</span>
        </span>
        <button class="btn-home" id="btn-home" style="display:none" onclick="goHome()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
          Home
        </button>
      </div>
    </header>

    <!-- Progress bar -->
    <div class="progress-bar" id="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Landing view -->
    <div class="view" id="view-landing">
      <div class="landing-inner">
        <h1 class="landing-greeting">Good to see you.</h1>
        <p class="landing-sub">Choose where you'd like to go.</p>
        <div id="landing-buttons"></div>
      </div>
    </div>

    <!-- Homework view -->
    <div class="view" id="view-homework">
      <div class="steps-viewport" id="steps-viewport">

        <div class="step" data-step="0">
          <div class="step-inner">
            <div class="step-label">Question 1</div>
            <h2 class="step-question">What is your first name?</h2>
            <input class="step-input" type="text" placeholder="Enter your first name" autocomplete="given-name" />
          </div>
        </div>

        <div class="step" data-step="1">
          <div class="step-inner">
            <div class="step-label">Question 2</div>
            <h2 class="step-question">What is your last name?</h2>
            <input class="step-input" type="text" placeholder="Enter your last name" autocomplete="family-name" />
          </div>
        </div>

      </div>
    </div>

    <!-- Bottom nav (homework only) -->
    <nav class="nav-bar" id="nav-bar">
      <button class="btn-back" id="btn-back" disabled>
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
      <button class="btn-next" id="btn-next">
        Continue
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </nav>

    <script>
      // ── Query param helpers ──────────────────────────────────────────
      function params() { return new URLSearchParams(window.location.search); }

      function buildURL(updates) {
        const p = params();
        Object.entries(updates).forEach(([k, v]) => {
          if (v == null) p.delete(k); else p.set(k, v);
        });
        return '?' + p.toString();
      }

      // ── DOM refs ─────────────────────────────────────────────────────
      const viewLanding   = document.getElementById('view-landing');
      const viewHomework  = document.getElementById('view-homework');
      const landingBtns   = document.getElementById('landing-buttons');
      const progressBar   = document.getElementById('progress-bar');
      const progressFill  = document.getElementById('progress-fill');
      const navBar        = document.getElementById('nav-bar');
      const btnBack       = document.getElementById('btn-back');
      const btnNext       = document.getElementById('btn-next');
      const stepNumEl     = document.getElementById('step-num');
      const stepCounter   = document.getElementById('step-counter');
      const btnHome       = document.getElementById('btn-home');

      const steps = Array.from(document.querySelectorAll('.step'));
      const total = steps.length;

      const ARROW = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`;

      // ── Landing button definitions ────────────────────────────────────
      const ALL_BUTTONS = [
        {
          key: 'homework',
          title: 'See Homework',
          desc: 'Answer questions at your own pace',
          style: 'primary',
          action: () => navigate({ view: 'homework', step: '1' }),
        },
        {
          key: 'design',
          title: 'See Design Sheet',
          desc: 'Review the plan layout',
          style: 'secondary',
          action: () => alert('Design Sheet coming soon'),
        },
        {
          key: 'cimi',
          title: 'See CIMI',
          desc: 'Open the CIMI interface',
          style: 'secondary',
          action: () => alert('CIMI coming soon'),
        },
      ];

      function buildLanding() {
        const p = params();
        const who  = p.get('who');
        const cimi = p.get('cimi');

        let keys = ['homework'];
        if (who === 'attorney') {
          keys = ['homework', 'design', 'cimi'];
        } else if (cimi === 'ready') {
          keys = ['homework', 'cimi'];
        }

        landingBtns.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.style.cssText = 'display:flex;flex-direction:column;gap:16px;';

        keys.forEach(key => {
          const def = ALL_BUTTONS.find(b => b.key === key);
          const btn = document.createElement('button');
          btn.className = `btn-landing ${def.style}`;
          btn.innerHTML = `
            <span class="btn-landing-label">
              <span class="btn-landing-title">${def.title}</span>
              <span class="btn-landing-desc">${def.desc}</span>
            </span>
            <span class="btn-landing-arrow">${ARROW}</span>
          `;
          btn.addEventListener('click', def.action);
          wrap.appendChild(btn);
        });

        landingBtns.appendChild(wrap);
      }

      // ── View switching ────────────────────────────────────────────────
      function showView(name) {
        viewLanding.classList.toggle('active', name === 'landing');
        viewHomework.classList.toggle('active', name === 'homework');
        navBar.classList.toggle('visible', name === 'homework');
        progressBar.classList.toggle('visible', name === 'homework');
        stepCounter.style.display = name === 'homework' ? '' : 'none';
        btnHome.style.display = name === 'homework' ? '' : 'none';
      }

      // ── Step navigation ───────────────────────────────────────────────
      let currentStep = 0;

      function renderStep(index, direction) {
        const prev = currentStep;

        if (prev !== index && direction !== 'none') {
          steps[prev].classList.remove('active');
          if (direction === 'forward') {
            steps[prev].classList.add('exit-left');
          } else {
            steps[prev].style.cssText = 'opacity:0;transform:translateX(60px);transition:none;';
          }

          if (direction === 'back') {
            steps[index].style.cssText = 'opacity:0;transform:translateX(-60px);transition:none;';
            requestAnimationFrame(() => requestAnimationFrame(() => {
              steps[index].style.cssText = '';
              steps[index].classList.add('active');
            }));
          } else {
            steps[index].classList.add('active');
          }

          setTimeout(() => {
            steps[prev].classList.remove('exit-left');
            steps[prev].style.cssText = '';
          }, 400);
        } else {
          steps.forEach((s, i) => s.classList.toggle('active', i === index));
        }

        currentStep = index;
        stepNumEl.textContent = currentStep + 1;
        progressFill.style.width = ((currentStep + 1) / total * 100) + '%';
        btnBack.disabled = currentStep === 0;
        btnNext.innerHTML = (currentStep === total - 1 ? 'Finish' : 'Continue') + ' ' + ARROW;

        setTimeout(() => steps[currentStep].querySelector('.step-input')?.focus(), 350);
      }

      // ── URL-driven routing ────────────────────────────────────────────
      function navigate(updates) {
        history.pushState(null, '', buildURL(updates));
        route();
      }

      function goHome() {
        navigate({ view: null, step: null });
      }

      function route() {
        const p = params();
        const view = p.get('view');
        const step = Math.min(Math.max(parseInt(p.get('step') || '1', 10), 1), total) - 1;

        if (view === 'homework') {
          showView('homework');
          const direction = step > currentStep ? 'forward' : step < currentStep ? 'back' : 'none';
          renderStep(step, direction);
        } else {
          buildLanding();
          showView('landing');
        }
      }

      // ── Button handlers ───────────────────────────────────────────────
      btnNext.addEventListener('click', () => {
        if (currentStep < total - 1) navigate({ view: 'homework', step: currentStep + 2 });
      });

      btnBack.addEventListener('click', () => {
        if (currentStep > 0) navigate({ view: 'homework', step: currentStep });
      });

      document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && params().get('view') === 'homework' && currentStep < total - 1) {
          navigate({ view: 'homework', step: currentStep + 2 });
        }
      });

      window.addEventListener('popstate', route);

      // ── Boot ──────────────────────────────────────────────────────────
      route();
    </script>

  </body>
</html>
